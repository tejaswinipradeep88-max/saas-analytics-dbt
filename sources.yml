version: 2

sources:
  - name: raw
    database: analytics_prod
    schema: raw
    description: >
      Raw event and entity data landed by the ingestion pipeline (Fivetran + Segment).
      All timestamps are stored in UTC as TIMESTAMP_NTZ.
      Do not query this layer directly from BI tools — use mart models instead.

    freshness:
      warn_after:  { count: 6,  period: hour }
      error_after: { count: 24, period: hour }
    loaded_at_field: _loaded_at

    tables:

      - name: users
        description: >
          One row per user. Created on first verified signup.
          Users are soft-deleted (no hard deletes); use is_deleted flag for filtering.
        columns:
          - name: user_id
            description: Surrogate key. UUID generated by the app layer.
            tests:
              - unique
              - not_null

          - name: account_id
            description: FK to accounts. Null for individual/self-serve users with no org.
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'accounts')
                  field: account_id

          - name: created_at
            description: UTC timestamp of email verification completion.
            tests:
              - not_null

          - name: plan_tier
            description: Current subscription tier at time of row snapshot.
            tests:
              - not_null
              - accepted_values:
                  values: ['free', 'starter', 'growth', 'enterprise']

          - name: country_code
            description: ISO 3166-1 alpha-2 country derived from signup IP.

          - name: signup_channel
            description: >
              Last-touch acquisition channel at signup.
              Values: organic, paid_search, paid_social, referral, product_led, direct.

      - name: accounts
        description: >
          One row per B2B account (company/workspace).
          churned_at is null for active accounts.
        columns:
          - name: account_id
            description: Surrogate key. UUID generated by the app layer.
            tests:
              - unique
              - not_null

          - name: account_name
            description: Company name as entered during onboarding.

          - name: mrr
            description: >
              Monthly Recurring Revenue in USD at time of last billing sync.
              Zero for free-tier accounts.
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: ">= 0"

          - name: company_size_band
            description: Employee headcount band from enrichment (e.g. Clearbit).
            tests:
              - accepted_values:
                  values: ['1-10', '11-50', '51-200', '201-500', '501-1000', '1000+', 'unknown']

          - name: csm_owner
            description: Email of the assigned Customer Success Manager. Null for self-serve accounts.

          - name: churned_at
            description: UTC timestamp of account cancellation. Null if still active.

      - name: events
        description: >
          Immutable event stream. One row per discrete user action.
          Appended only — never updated or deleted.
          High-cardinality table; always filter on event_ts when querying.
        freshness:
          warn_after:  { count: 2, period: hour }
          error_after: { count: 6, period: hour }
        columns:
          - name: event_id
            description: UUID. Deduplication key — Segment may deliver duplicates within 24h windows.
            tests:
              - unique
              - not_null

          - name: user_id
            description: FK to users. Anonymous events (pre-signup) have a null user_id.
            tests:
              - relationships:
                  to: source('raw', 'users')
                  field: user_id
                  config:
                    where: "user_id IS NOT NULL"

          - name: event_type
            description: Snake_case event name as defined in the tracking plan.
            tests:
              - not_null

          - name: event_ts
            description: UTC timestamp when the event was emitted by the client.
            tests:
              - not_null

          - name: session_id
            description: Client-side session UUID. Groups events within a single browsing session.

          - name: properties
            description: >
              Semi-structured VARIANT payload. Schema varies by event_type.
              Documented per event in the tracking plan (Notion → Data → Tracking Plan).
