name: 'saas_analytics'
version: '1.0.0'
config-version: 2

profile: 'saas_analytics'

model-paths: ["models"]
macro-paths:  ["macros"]
test-paths:   ["tests"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  saas_analytics:
    staging:
      +materialized: view
      +schema: staging
    mart:
      +materialized: incremental
      +schema: mart
      +on_schema_change: fail
